<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="producerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="hubGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="consumerGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="kanbanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="system-ui, sans-serif" font-size="28" font-weight="bold" fill="#ffffff">Brain OS 生产者-消费者架构</text>
  <text x="400" y="75" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" fill="#94a3b8">todo-backlog.md 作为统一任务入口</text>
  
  <!-- Producers Section -->
  <rect x="50" y="100" width="200" height="180" rx="12" fill="url(#producerGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="150" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">生产者（8 个）</text>
  
  <text x="150" y="165" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 史官记录</text>
  <text x="150" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 观察者自检</text>
  <text x="150" y="205" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 知识库审计</text>
  <text x="150" y="225" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 夜间文章整合</text>
  <text x="150" y="245" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 对话知识挖掘</text>
  <text x="150" y="265" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 知识聚合</text>
  <text x="150" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#e0e7ff">• 自动提交巡检</text>
  
  <!-- Arrow: Producers → Hub -->
  <path d="M 250 190 L 280 190" stroke="#10b981" stroke-width="3" fill="none" marker-end="url(#arrowGreen)"/>
  <polygon points="280,185 290,190 280,195" fill="#10b981"/>
  
  <!-- Central Hub: todo-backlog.md -->
  <rect x="300" y="130" width="200" height="120" rx="12" fill="url(#hubGrad)" filter="url(#shadow)"/>
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">todo-backlog.md</text>
  <text x="400" y="195" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#d1fae5">统一任务入口</text>
  <text x="400" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a7f3d0">高 → 每日早报</text>
  <text x="400" y="238" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a7f3d0">中 → 每周计划</text>
  <text x="400" y="256" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#a7f3d0">低 → 月度总结</text>
  
  <!-- Arrow: Hub → Consumers -->
  <path d="M 500 190 L 530 190" stroke="#f59e0b" stroke-width="3" fill="none"/>
  <polygon points="530,185 540,190 530,195" fill="#f59e0b"/>
  
  <!-- Consumers Section -->
  <rect x="550" y="100" width="200" height="180" rx="12" fill="url(#consumerGrad)" filter="url(#shadow)" opacity="0.9"/>
  <text x="650" y="130" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">消费者（3 个）</text>
  
  <rect x="570" y="145" width="160" height="40" rx="6" fill="#fef3c7" opacity="0.3"/>
  <text x="650" y="170" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">每日早报</text>
  <text x="650" y="185" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fef3c7">高优先级</text>
  
  <rect x="570" y="195" width="160" height="40" rx="6" fill="#fef3c7" opacity="0.3"/>
  <text x="650" y="220" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">每周计划</text>
  <text x="650" y="235" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fef3c7">中优先级</text>
  
  <rect x="570" y="245" width="160" height="40" rx="6" fill="#fef3c7" opacity="0.3"/>
  <text x="650" y="270" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="bold" fill="#ffffff">月度总结</text>
  <text x="650" y="285" text-anchor="middle" font-family="system-ui, sans-serif" font-size="10" fill="#fef3c7">低优先级</text>
  
  <!-- Kanban Section -->
  <rect x="300" y="300" width="200" height="80" rx="12" fill="url(#kanbanGrad)" filter="url(#shadow)"/>
  <text x="400" y="335" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Kanban 双向同步</text>
  <text x="400" y="360" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ede9fe">todo ↔ Kanban 卡片</text>
  <text x="400" y="378" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#ede9fe">状态同步 · 防重复</text>
  
  <!-- Arrow: Hub → Kanban -->
  <path d="M 400 250 L 400 300" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,5" fill="none"/>
  
  <!-- Footer -->
  <rect x="50" y="420" width="700" height="150" rx="12" fill="#0f172a" opacity="0.8"/>
  <text x="400" y="455" text-anchor="middle" font-family="system-ui, sans-serif" font-size="14" font-weight="bold" fill="#94a3b8">核心创新</text>
  
  <text x="150" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#10b981">✅ todo-backlog.md 统一入口</text>
  <text x="150" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#10b981">✅ 生产者-消费者架构</text>
  <text x="150" y="545" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#10b981">✅ Kanban 双向同步</text>
  
  <text x="400" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b">📦 MIT 开源协议</text>
  <text x="400" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b">🔗 零额外依赖</text>
  <text x="400" y="545" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#f59e0b">🚀 一键部署</text>
  
  <text x="650" y="495" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6">📖 完整文档</text>
  <text x="650" y="520" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6">🛠️ 配置模板</text>
  <text x="650" y="545" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#8b5cf6">💡 V2 升级方向</text>
  
  <!-- GitHub Badge -->
  <rect x="300" y="590" width="200" height="35" rx="17" fill="#24292e"/>
  <text x="400" y="613" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" fill="#ffffff">github.com/jf7642132/brain-os</text>
</svg>